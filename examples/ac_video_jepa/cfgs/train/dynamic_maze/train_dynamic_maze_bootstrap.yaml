# Dynamic Maze bootstrap WM: no A* teacher, no A* labels.
#
# Data comes from local exploration (`local_goal_frontier`): one-step novelty,
# weak goal bias, visit penalty and epsilon random actions. The value head is
# trained by hindsight TD on trajectory windows and model rollouts.
logging:
  log_wandb: false
  wandb_group:
  wandb_sweep:
  log_every: 10
  exp_suffix: dynamic_maze_bootstrap_wm
  save_every_n_epochs: 1
  tqdm_silent: false
meta:
  model_folder:
  init_from:
  load_model: false
  enable_plan_eval: false
  eval_every_itr: -1
  light_eval_freq: 100
  seed: 1
data:
  env_name: dynamic_maze
  batch_size: 128
  sample_length: 33
  n_steps: 129
  min_path_length: 0
  layout_use_astar_filter: false
  num_doors: 8
  door_initial_open_prob: 0.35
  door_toggle_prob: 0.04
  fog_radius: 4
  teacher_policy: local_goal_frontier
  explore_random_prob: 0.12
  explore_novelty_bonus: 1.0
  explore_goal_bias: 0.08
  explore_visit_penalty: 0.15
  num_workers: 0
  pin_mem: false
  persistent_workers: false
  pipeline:
    mode: stream
    backend: cpu
    num_gen_workers: 16
    chunk_size: 2048
    dtype: bfloat16
training:
  use_amp: true
  dtype: bfloat16
model:
  compile: false
  dobs: 4
  henc: 128
  hpre: 128
  dstc: 128
  nsteps: 8
  encoder_architecture: impala
  train_rollout: last
  encoder_skip_connections: true
  predictor_skip_connections: true
  aux_pos_coeff: 0.05
  value_coeff: 1.0
  value_lr: 0.001
  value_gamma: 0.96
  value_mode: multi_horizon_td
  value_horizons: [1, 2, 4, 8, 16, 32]
  value_pairs_per_horizon: 12
  regularizer:
    cov_coeff: 8
    std_coeff: 16
    sim_coeff_t: 12
    idm_coeff: 1
    first_t_only: false
    spatial_as_samples: false
    use_proj: false
    idm_after_proj: false
    sim_t_after_proj: false
optim:
  epochs: 5
  lr: 0.0002
  grad_clip_enc: 2.0
  grad_clip_pred: 2.0
  weight_decay: 1.e-5
eval:
  plan_cfg_path:
  eval_cfg_path:
