# Dynamic maze environment dataset configuration.

maze_height: 21
maze_width: 21
cell_size: 3
img_size: 63

n_steps: 129
sample_length: 17
min_path_length: 50
max_gen_retries: 64
layout_use_astar_filter: true

# Dynamic doors are wall cells that connect two existing corridor cells when open.
num_doors: 8
door_initial_open_prob: 0.35
door_toggle_prob: 0.04
min_door_candidates: 8

# Fog-of-war radius in maze cells. Unknown cells are hidden from the observation.
fog_radius: 4
fog_metric: manhattan

# Teacher used to generate trajectories and A*-based action labels.
# oracle_replan: A* on the current full dynamic grid.
# fog_optimistic: A* on observed grid, treating unknown cells as free.
# fog_conservative: A* on observed grid, treating unknown cells as walls.
# local_goal_frontier: no A*; one-step local novelty + weak goal bias.
teacher_policy: oracle_replan
explore_random_prob: 0.12
explore_repeat_prob: 0.65
explore_novelty_bonus: 1.0
explore_goal_bias: 0.08
explore_visit_penalty: 0.15

agent_std: 1.2
seed: 1

size: 100000
val_size: 10000
batch_size: 64
train: true
normalize: true

num_workers: 0
pin_mem: false
persistent_workers: false
device: cpu
